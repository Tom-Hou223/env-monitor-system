<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>环境监测数据系统</title>
    <!-- 引入第三方库 -->
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/1.9.1/jquery.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/vue/2.6.14/vue.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/vue-resource/1.5.1/vue-resource.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
</head>
<body>
<div id="mainenvtemplate" class="container">
    <h2 align="center">环境监测数据列表</h2>
    <hr/>
    <div>
        <table class="table table-striped table-hover table-bordered">
            <tr align="center">
                <td>编号</td>
                <td>温度(℃)</td>
                <td>湿度(%)</td>
                <td>气体数值</td>
                <td>采集时间</td>
            </tr>
            <tr align="center" v-for="env in envlist">
                <td>{{env.id}}</td>
                <td>{{env.tmp}}</td>
                <td>{{env.him}}</td>
                <td>{{env.gan}}</td>
                <td>{{env.cdate}}</td>
            </tr>
        </table>
        <!-- 分页控件 -->
        <table class="table table-striped">
            <tr align="center">
                <td>
                    <input type="button" class="btn btn-primary" value="首页" @click="dofirstPage()">&nbsp;&nbsp;
                    <input type="button" class="btn btn-primary" value="上页" @click="doupPage()">&nbsp;&nbsp;
                    <input type="button" class="btn btn-primary" value="下页" @click="donextPage()">&nbsp;&nbsp;
                    <input type="button" class="btn btn-primary" value="末页" @click="dolastPage()">
                </td>
                <td>
                    跳转到第
                    <input type="text" name="page" id="page" v-model="page" style="width:60px">
                    页
                    <input type="button" class="btn btn-success" value="确定" @click="dochangePage()">
                </td>
                <td>{{page}}/{{totalpage}}</td>
            </tr>
        </table>
    </div>
    <hr/>
    <!-- 图表展示区域 -->
    <div align="center" style="display: flex;justify-content: space-around;">
        <div id="mainbar" style="width: 600px;height:400px;"></div>
        <div id="mainpip" style="width: 600px;height:400px;"></div>
    </div>
</div>
</body>
<script>
    // Vue实例
    var envvue=new Vue({
        el:'#mainenvtemplate',
        data:{
            page:1,
            pagesize:5,
            totalpage:1,
            envlist:[],
        },
        created:function (){
            this.dofindPageAll();
        },
        methods:{
            // 分页查询数据
            dofindPageAll(){
                console.log('查询数据');
                this.$http.get('env/findPageAll?page='+this.page+'&pagesize='+this.pagesize+'&t='+new Date().getTime())
                    .then(resdata=>{
                        let mappage=resdata.body;
                        this.page=mappage.page;
                        this.pagesize=mappage.pagesize;
                        this.totalpage=mappage.totalPage;
                        this.envlist=mappage.data;
                    });
            },
            // 分页方法
            dofirstPage(){
                this.page=1;
                this.dofindPageAll();
            },
            doupPage(){
                this.page=this.page-1;
                if(this.page<1){
                    this.page=1;
                }
                this.dofindPageAll();
            },
            donextPage(){
                this.page=this.page+1;
                if(this.page>this.totalpage){
                    this.page=this.totalpage;
                }
                this.dofindPageAll();
            },
            dolastPage(){
                this.page=this.totalpage;
                this.dofindPageAll();
            },
            dochangePage(){
                if(isNaN(this.page)){
                    alert("请输入正确的数字！");
                    this.page=1;
                    return;
                }
                this.dofindPageAll();
            },
        }
    });

    // 柱状图渲染
    $.getJSON("env/getEnvListTop5", function(resdata) {
        var myChart = echarts.init(document.getElementById('mainbar'));
        var option = {
            title: { text: '环境监测数据柱状图' },
            tooltip: {},
            legend: { data: ['温度', '湿度', '气味'] },
            xAxis: { data: ['第1组', '第2组', '第3组', '第4组', '第5组'] },
            yAxis: {},
            series: resdata
        };
        myChart.setOption(option);
    });

    // 饼图渲染
    $.getJSON('env/findAvgEnvData',function(resdata){
        var myChart = echarts.init(document.getElementById('mainpip'));
        var option = {
            title: { text: '环境监测平均值饼图' },
            tooltip: {},
            legend: { data: ['温度', '湿度', '气味'] },
            series: [
                {
                    name: '环境监测数据',
                    type: 'pie',
                    radius: '55%',
                    data: resdata
                }
            ]
        };
        myChart.setOption(option);
    });

    // 每5秒刷新页面
    setTimeout(function(){
        location.reload(true);
    }, 5000);
</script>
</html>
